<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ConnectPJ - Sistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    
    <!-- MANTENHA O MESMO CABEÇALHO ANTERIOR... (Pulei o topo para o código ficar mais curto e focar na solução) -->
    
    <!-- BOTÃO QUE ABRE O MODAL AGORA -->
    <button id="btn-abrir-seletor-folha" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-3 rounded-lg">
        🔄 Selecionar Contratos para Folha
    </button>

    <!-- MODAL DE SELEÇÃO DE CONTRATOS (NOVO) -->
    <div id="modalSeletorFolha" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl w-full max-w-lg p-6">
            <h3 class="text-xl font-bold mb-4 text-blue-900">Selecione os contratos para a folha</h3>
            <div id="listaContratosCheck" class="max-h-64 overflow-y-auto mb-4 space-y-2 border p-3 rounded">
                <!-- Contratos injetados aqui -->
            </div>
            <div class="flex justify-end gap-2">
                <button id="btn-fechar-seletor" class="px-4 py-2 border rounded">Cancelar</button>
                <button id="btn-confirmar-geracao" class="px-4 py-2 bg-blue-600 text-white rounded font-bold">Gerar Folha Selecionada</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ... (Mantenha as importações e configurações iniciais igual ao código anterior)

        // Lógica do Modal
        const btnAbrir = document.getElementById('btn-abrir-seletor-folha');
        const modal = document.getElementById('modalSeletorFolha');
        const listaCheck = document.getElementById('listaContratosCheck');

        btnAbrir.addEventListener('click', () => {
            listaCheck.innerHTML = '';
            Object.keys(contratosLocais).forEach(key => {
                const c = contratosLocais[key];
                if(String(c.status).toLowerCase() === "inativo") return;
                
                listaCheck.innerHTML += `
                    <label class="flex items-center gap-3 p-2 hover:bg-slate-50 rounded">
                        <input type="checkbox" value="${key}" class="check-contrato w-4 h-4">
                        <span class="text-sm font-semibold">${c.razaoSocial || c.nome}</span>
                    </label>
                `;
            });
            modal.classList.remove('hidden');
        });

        document.getElementById('btn-fechar-seletor').addEventListener('click', () => modal.classList.add('hidden'));

        document.getElementById('btn-confirmar-geracao').addEventListener('click', async () => {
            const selecionados = document.querySelectorAll('.check-contrato:checked');
            if(selecionados.length === 0) { alert("Selecione ao menos um contrato!"); return; }

            const updates = {};
            selecionados.forEach(chk => {
                const key = chk.value;
                const contrato = contratosLocais[key];
                
                let valorFixoLimpo = parseFloat(String(contrato.valorFixoMensal || '0').replace('.', '').replace(',', '.'));
                if (isNaN(valorFixoLimpo)) valorFixoLimpo = 0;

                updates[`folhas_pagamento/${competenciaSelecionada}/${key}`] = {
                    nome: contrato.razaoSocial || contrato.nome,
                    CNPJ: contrato.CNPJ || contrato.cpf || "-",
                    emailCorp: contrato.emailCorp || "",
                    regular: { valorFixo: valorFixoLimpo, motorEvento: "", motorValor: 0, nfStatus: "Pendente", statusPagamento: "Aguardando NF" },
                    complementar: { motorEvento: "", motorValor: 0, nfStatus: "Pendente", statusPagamento: "Sem Lançamento" }
                };
            });

            await update(ref(db), updates);
            modal.classList.add('hidden');
            alert("Folha gerada para os contratos selecionados!");
        });
        
        // ... (O restante da lógica de onValue e renderização permanece igual)
    </script>
</body>
</html>
