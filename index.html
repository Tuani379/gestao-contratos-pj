<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ConnectPJ - Sistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">ConnectPJ</h1>
            <div class="bg-blue-800 p-1 rounded-lg flex gap-1">
                <button class="bg-blue-600 px-4 py-2 rounded text-sm font-bold">Painel Corporativo (RH/Fin)</button>
                <button class="px-4 py-2 text-sm opacity-75 hover:bg-blue-700 rounded transition">Área do Prestador (PJ)</button>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b shadow-sm">
        <div class="max-w-7xl mx-auto flex gap-8 px-6">
            <button onclick="mostrar('dashboard')" class="py-4 border-b-2 border-blue-600 text-sm font-bold text-blue-900">Dashboard & Folha Mensal</button>
            <button onclick="mostrar('contratos')" class="py-4 border-b-2 border-transparent text-sm font-bold text-slate-500 hover:text-slate-900">Contratos Cadastrados</button>
            <button onclick="mostrar('relatorios')" class="py-4 border-b-2 border-transparent text-sm font-bold text-slate-500 hover:text-slate-900">Relatórios & Centro de Custos</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <section id="dashboard" class="space-y-6">
            <div class="grid grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl border shadow-sm"><p class="text-[10px] uppercase font-bold text-slate-400">Folha de Competência</p><p class="text-xl font-black">Junho/2026</p></div>
                <div class="bg-white p-4 rounded-xl border shadow-sm"><p class="text-[10px] uppercase font-bold text-slate-400">Total Bruto</p><p class="text-xl font-black text-emerald-600">R$ 45.500,00</p></div>
                <div class="bg-white p-4 rounded-xl border shadow-sm"><p class="text-[10px] uppercase font-bold text-slate-400">Notas Fiscais</p><p class="text-xl font-black">0 / 0</p></div>
                <div class="bg-white p-4 rounded-xl border shadow-sm"><p class="text-[10px] uppercase font-bold text-slate-400">Contratos Ativos</p><p class="text-xl font-black">0 Empresas</p></div>
            </div>
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <h2 class="font-bold text-blue-900 mb-4">⚙️ Motor Financeiro</h2>
                <input type="number" class="p-2 border rounded w-full" placeholder="ID do Contrato">
            </div>
        </section>

        <!-- Seção de Contratos Atualizada -->
<script type="module">
    // Importações necessárias do Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // Configuração do seu projeto (a mesma que você já deve ter)
    const firebaseConfig = {
        apiKey: "AIzaSyAHbovXitP9YkRTM902gy79Rwy9st3Igq8",
        authDomain: "connectpj-15532.firebaseapp.com",
        databaseURL: "https://connectpj-15532-default-rtdb.firebaseio.com",
        projectId: "connectpj-15532",
        storageBucket: "connectpj-15532.firebasestorage.app",
        messagingSenderId: "658474420007",
        appId: "1:658474420007:web:94f3331b69b2a298af4b02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // Função que "dá vida" ao botão
    window.salvarCadastro = async () => {
        try {
            const nome = document.getElementById('campoNome').value;
            const cpf = document.getElementById('campoCpf').value;
            const email = document.getElementById('campoEmail').value;
            const cargo = document.getElementById('campoCargo').value;
            const fileInput = document.getElementById('inputArquivo');
            
            let urlArquivo = "";

            // Se um arquivo foi selecionado, faz o upload
            if (fileInput && fileInput.files.length > 0) {
                const arquivo = fileInput.files[0];
                const storageRef = sRef(storage, 'documentos/' + arquivo.name);
                const snapshot = await uploadBytes(storageRef, arquivo);
                urlArquivo = await getDownloadURL(snapshot.ref);
            }

            // Envia para o banco de dados
            await push(ref(db, 'contratos'), {
                nome: nome,
                cpf: cpf,
                email: email,
                cargo: cargo,
                urlArquivo: urlArquivo,
                dataCadastro: new Date().toLocaleDateString()
            });

            alert("Cadastro salvo com sucesso!");
            document.getElementById('modalCadastro').classList.add('hidden');
        } catch (error) {
            console.error("Erro:", error);
            alert("Erro ao salvar. Verifique o console do navegador.");
        }
    };
</script>

<script>
function abrirTab(evt, tabId) {
    // Esconder conteúdo e resetar estilo dos botões
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn py-4 border-b-2 border-transparent text-slate-500 font-bold text-sm ml-6");
    
    // Mostrar aba e marcar botão ativo
    document.getElementById(tabId).classList.remove('hidden');
    evt.currentTarget.className = "tab-btn py-4 border-b-2 border-blue-600 font-bold text-sm ml-6";
}
</script>

        <section id="relatorios" class="hidden bg-white p-6 rounded-xl border shadow-sm">
            <h2 class="text-xl font-bold">Relatórios & Centro de Custos</h2>
            <p class="text-slate-500">Área em construção para visualização de indicadores financeiros.</p>
        </section>
    </main>

    <script>
        function mostrar(id) {
            // Esconde todas as seções
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('contratos').classList.add('hidden');
            document.getElementById('relatorios').classList.add('hidden');
            
            // Mostra a seção desejada
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
