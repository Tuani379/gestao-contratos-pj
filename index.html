<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ConnectPJ - Sistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">

    <!-- CABEÇALHO MANTIDO -->
    <header class="bg-blue-900 text-white p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">ConnectPJ</h1>
            <div class="bg-blue-800 p-1 rounded-lg flex gap-1">
                <button class="bg-white text-blue-900 px-4 py-1 rounded text-sm font-bold">Painel Corporativo</button>
                <button class="text-white px-4 py-1 text-sm opacity-75">Área do Prestador</button>
            </div>
        </div>
    </header>

    <!-- NAVEGAÇÃO MANTIDA -->
    <nav class="bg-white border-b px-6">
        <div class="max-w-7xl mx-auto flex gap-8">
            <button class="py-4 border-b-2 border-blue-600 text-sm font-bold text-blue-900">Dashboard & Folha</button>
            <button class="py-4 border-b-2 border-transparent text-sm font-bold text-slate-500">Contratos</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <!-- SEÇÃO MANTIDA COM O BOTÃO ALTERADO -->
        <div class="bg-white p-6 rounded-xl border shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-bold text-slate-800">Gestão de Folha Mensal</h2>
                    <p class="text-sm text-slate-500">Selecione os contratos para processar a competência.</p>
                </div>
                <!-- BOTÃO ALTERADO PARA ABRIR MODAL -->
                <button id="btn-abrir-seletor" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2">
                    🔄 Criar Folha do Mês
                </button>
            </div>

            <table class="w-full text-left">
                <thead><tr class="border-b bg-slate-50"><th class="p-3 text-sm">Prestador</th><th class="p-3 text-sm">Valor</th><th class="p-3 text-sm">Status</th></tr></thead>
                <tbody id="listaFolha"></tbody>
            </table>
        </div>
    </main>

    <!-- MODAL DE SELEÇÃO -->
    <div id="modalSeletor" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl w-full max-w-lg p-6">
            <h3 class="text-lg font-bold mb-4 text-blue-900">Selecione contratos para 07/2026:</h3>
            <div id="checkList" class="max-h-60 overflow-y-auto border p-3 rounded mb-4 space-y-2"></div>
            <div class="flex justify-end gap-2">
                <button id="btn-cancelar" class="px-4 py-2 border rounded">Cancelar</button>
                <button id="btn-confirmar" class="px-4 py-2 bg-blue-600 text-white rounded font-bold">Gerar Folha</button>
            </div>
        </div>
    </div>
        <!-- RODAPÉ DO MODAL (BOTOES ALINHADOS) -->
        <div class="flex justify-end gap-3 border-t pt-4">
            <button id="btn-cancelar-modal" class="px-6 py-2 text-sm font-bold text-slate-600 hover:bg-slate-100 rounded-lg">Cancelar</button>
            <button id="btn-processar-folha" class="px-6 py-2 text-sm font-bold bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-lg">
                Processar e Criar Folha
            </button>
        </div>
    </div>
</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://connectpj-15532-default-rtdb.firebaseio.com" }));
        let contratos = {};
        const comp = "07/2026";

        onValue(ref(db, 'contratos'), (snap) => { contratos = snap.val() || {}; });

        // Renderiza tabela original
        onValue(ref(db, `folhas_pagamento/${comp}`), (snap) => {
            const folha = snap.val() || {};
            const tbody = document.getElementById('listaFolha');
            tbody.innerHTML = Object.keys(folha).map(key => `
                <tr class="border-b"><td class="p-3 text-sm">${folha[key].nome}</td><td class="p-3 text-sm">R$ ${folha[key].regular?.valorFixo || 0}</td><td class="p-3 text-sm">${folha[key].regular?.statusPagamento || 'Pendente'}</td></tr>
            `).join('');
        });

        // Lógica do Modal
        document.getElementById('btn-abrir-seletor').addEventListener('click', () => {
            const list = document.getElementById('checkList');
            list.innerHTML = Object.keys(contratos).map(key => `
                <div><input type="checkbox" value="${key}" class="mr-2"> ${contratos[key].razaoSocial || contratos[key].nome}</div>
            `).join('');
            document.getElementById('modalSeletor').classList.remove('hidden');
        });

        document.getElementById('btn-confirmar').addEventListener('click', async () => {
            const checks = document.querySelectorAll('#checkList input:checked');
            const updates = {};
            checks.forEach(chk => {
                const c = contratos[chk.value];
                let v = parseFloat(String(c.valorFixoMensal || '0').replace('.', '').replace(',', '.'));
                updates[`folhas_pagamento/${comp}/${chk.value}`] = {
                    nome: c.razaoSocial || c.nome,
                    regular: { valorFixo: isNaN(v) ? 0 : v, statusPagamento: "Aguardando NF" }
                };
            });
            await update(ref(db), updates);
            document.getElementById('modalSeletor').classList.add('hidden');
        });

        document.getElementById('btn-cancelar').addEventListener('click', () => document.getElementById('modalSeletor').classList.add('hidden'));
    </script>
</body>
</html>
