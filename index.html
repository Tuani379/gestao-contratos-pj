<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ConnectPJ - Sistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">ConnectPJ</h1>
            <div class="bg-blue-800 p-1 rounded-lg flex gap-1">
                <button class="bg-blue-600 px-4 py-2 rounded text-sm font-bold">Painel Corporativo (RH/Fin)</button>
                <button class="px-4 py-2 text-sm opacity-75 hover:bg-blue-700 rounded transition">Área do Prestador (PJ)</button>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b shadow-sm">
        <div class="max-w-7xl mx-auto flex gap-8 px-6">
            <button onclick="mostrar('dashboard')" class="py-4 border-b-2 border-blue-600 text-sm font-bold text-blue-900">Dashboard & Folha Mensal</button>
            <button onclick="mostrar('contratos')" class="py-4 border-b-2 border-transparent text-sm font-bold text-slate-500 hover:text-slate-900">Contratos Cadastrados</button>
            <button onclick="mostrar('relatorios')" class="py-4 border-b-2 border-transparent text-sm font-bold text-slate-500 hover:text-slate-900">Relatórios & Centro de Custos</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <section id="dashboard" class="space-y-6">
            </section>

        <section id="contratos" class="hidden p-6 bg-white rounded-xl border shadow-sm">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-blue-900">Gestão de Contratos</h2>
        <button onclick="document.getElementById('modalCadastro').classList.remove('hidden')" 
                class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">
            + Novo Cadastro
        </button>
    </div>

    <div id="modalCadastro" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl w-full max-w-2xl p-6 overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-bold mb-4">Novo Cadastro</h3>
            
            <div class="grid grid-cols-2 gap-4">
                <input id="campoNome" type="text" placeholder="Nome Completo" class="w-full p-2 border rounded">
                <input id="campoCpf" type="text" placeholder="CPF" class="w-full p-2 border rounded">
                <input id="campoEmail" type="text" placeholder="E-mail Pessoal" class="w-full p-2 border rounded">
                <input id="campoCep" type="text" placeholder="CEP" class="w-full p-2 border rounded">
                <input id="campoMunicipio" type="text" placeholder="Município" class="w-full p-2 border rounded">
                <input id="campoRazaoSocial" type="text" placeholder="Razão Social" class="w-full p-2 border rounded">
                <input id="campoCNPJ" type="text" placeholder="CNPJ" class="w-full p-2 border rounded">
                <input id="campoEmailCorp" type="text" placeholder="E-mail Corporativo" class="w-full p-2 border rounded">
                <input id="campoVigencia" type="text" placeholder="Vigência" class="w-full p-2 border rounded">
                <input id="campoCentrodeCusto" type="text" placeholder="Centro de Custo" class="w-full p-2 border rounded">
                <input id="campoCargo" type="text" placeholder="Cargo" class="w-full p-2 border rounded">
                <input id="campoValorFixoMensal" type="text" placeholder="Valor Fixo Mensal" class="w-full p-2 border rounded">
                <input id="campoDepartamento" type="text" placeholder="Departamento" class="w-full p-2 border rounded">
                <input id="campoGestorDireto" type="text" placeholder="Gestor Direto" class="w-full p-2 border rounded">
                <input id="campoPapel" type="text" placeholder="Papel" class="w-full p-2 border rounded">
                <input id="campoStatus" type="text" placeholder="Status" class="w-full p-2 border rounded">
                <input id="campoUnidade" type="text" placeholder="Unidade" class="w-full p-2 border rounded">
            </div>

            <label class="block mt-4 mb-2 font-bold text-sm">Anexar Documento:</label>
            <input id="inputArquivo" type="file" class="w-full mb-6">

            <div class="flex justify-end gap-2">
                <button onclick="document.getElementById('modalCadastro').classList.add('hidden')" class="px-4 py-2 border rounded">Cancelar</button>
                <button onclick="salvarCadastro()" class="px-4 py-2 bg-blue-600 text-white rounded font-bold">Salvar Cadastro</button>
            </div>
        </div>
    </div>
</section>

        <section id="relatorios" class="hidden bg-white p-6 rounded-xl border shadow-sm">
            <h2 class="text-xl font-bold">Relatórios</h2>
        </section>
    </main>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAHbovXitP9YkRTM902gy79Rwy9st3Igq8",
        authDomain: "connectpj-15532.firebaseapp.com",
        databaseURL: "https://connectpj-15532-default-rtdb.firebaseio.com",
        projectId: "connectpj-15532",
        storageBucket: "connectpj-15532.firebasestorage.app",
        messagingSenderId: "658474420007",
        appId: "1:658474420007:web:94f3331b69b2a298af4b02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    window.salvarCadastro = async () => {
        try {
            // Coletando TODOS os campos que adicionamos no HTML
            const dados = {
                nome: document.getElementById('campoNome').value,
                cpf: document.getElementById('campoCpf').value,
                emailPessoal: document.getElementById('campoEmail').value,
                cep: document.getElementById('campoCep').value,
                municipio: document.getElementById('campoMunicipio').value,
                razaoSocial: document.getElementById('campoRzaoSocial').value,
                CNPJ: document.getElementById('campoCNPJ').value,
                emailCorp: document.getElementById('campoEmailCorp').value,
                vigencia: document.getElementById('campoVigencia').value,
                centrodeCusto: document.getElementById('campoCentrodeCusto').value,
                cargo: document.getElementById('campoCargo').value,
                valorFixoMensal: document.getElementById('campoValorFixoMensal').value,
                departamento: document.getElementById('campoDepartamento').value,
                gestorDireto: document.getElementById('campoGestorDireto').value,
                papel: document.getElementById('campoPapel').value,
                status: document.getElementById('campoStatus').value,
                unidade: document.getElementById('campoUnidade').value,
                dataCadastro: new Date().toLocaleDateString()
            };

            // Upload de arquivo
            const fileInput = document.getElementById('inputArquivo');
            if (fileInput && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const storageRef = sRef(storage, 'documentos/' + file.name);
                const snapshot = await uploadBytes(storageRef, file);
                dados.urlArquivo = await getDownloadURL(snapshot.ref);
            }

            // Enviando ao Firebase
            await push(ref(db, 'contratos'), dados);
            
            alert("Cadastro salvo com sucesso!");
            document.getElementById('modalCadastro').classList.add('hidden');
            location.reload(); // Atualiza a página para limpar os campos
      } catch (error) {
            console.error("Erro:", error);
            alert("Erro ao salvar: " + error.message);
        }
    }

    function mostrar(id) {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('contratos').classList.add('hidden');
        document.getElementById('relatorios').classList.add('hidden');

        const secao = document.getElementById(id);
        if (secao) {
            secao.classList.remove('hidden');
        }
    }
</script>
</body>
