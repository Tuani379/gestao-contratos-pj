<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Folha Mensal PJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 antialiased">

    <script type="module">
        // Importações do Firebase (Ajuste a inicialização conforme o seu projeto)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Configuração do seu Firebase (Substitua pelos seus dados reais)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_AUTH_DOMAIN",
            databaseURL: "SUA_DATABASE_URL",
            projectId: "SEU_PROJECT_ID",
            storageBucket: "SEU_STORAGE_BUCKET",
            messagingSenderId: "SEU_MESSAGING_SENDER_ID",
            appId: "SUA_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Bancos de dados locais (Exemplos de estruturas que seu código consome)
        let bancoContratos = [];
        let bancoFolhaMensal = [];

        // Ouvintes do Firebase para sincronização em tempo real
        onValue(ref(db, 'contratos'), (snapshot) => {
            if (snapshot.exists()) {
                bancoContratos = snapshot.val();
            }
        });

        onValue(ref(db, 'folhaMensal'), (snapshot) => {
            if (snapshot.exists()) {
                bancoFolhaMensal = snapshot.val();
                // Atualiza a tabela ou relatórios automaticamente ao mudar dados na nuvem
                if (typeof renderizarRelatorio === "function") renderizarRelatorio();
            }
        });

        // ==========================================
        // ENGENHARIA DE FUNÇÕES E LÓGICA DO MOTOR
        // ==========================================

        function renderizarRelatorio() {
            const corpo = document.getElementById('corpoTabelaRelatorio');
            if(!corpo) return;
            
            corpo.innerHTML = "";
            let totalConsolidado = 0;
            const cc = document.getElementById('filtroCentroCusto')?.value || 'todos';
            const pjFiltro = document.getElementById('filtroPrestador')?.value || 'todos';
            const tipo = document.getElementById('filtroTipoFolha')?.value || 'todos';

            bancoFolhaMensal.forEach(item => {
                const pj = bancoContratos.find(c => c.id === item.contratoId);
                if(!pj) return;

                if(cc !== 'todos' && pj.centroCusto !== cc) return;
                if(pjFiltro !== 'todos' && pj.razaoSocial !== pjFiltro) return;
                if(tipo !== 'todos' && item.tipo !== tipo) return;

                totalConsolidated += item.liquido;

                corpo.innerHTML += `
                    <tr class="hover:bg-slate-50 text-slate-700">
                        <td class="p-3 font-medium">${pj.razaoSocial}</td>
                        <td class="p-3">${pj.centroCusto}</td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded text-xs font-bold ${item.tipo === 'Regular' ? 'bg-blue-50 text-blue-700' : 'bg-purple-50 text-purple-700'}">${item.tipo}</span></td>
                        <td class="p-3 text-xs text-slate-500">${item.descricao}</td>
                        <td class="p-3 text-right font-bold text-slate-900">R$ ${item.liquido.toFixed(2)}</td>
                    </tr>
                `;
            });

            const totalTxt = document.getElementById('totalRelatorioSoma');
            if(totalTxt) {
                totalTxt.innerText = `R$ ${totalConsolidado.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            }
        }

        window.processarLancamentoMotor = function() {
            const contratoId = parseInt(document.getElementById('motorContrato').value);
            const tipo = document.getElementById('motorTipoFolha').value;
            const evento = document.getElementById('motorEvento').value;
            const valor = parseFloat(document.getElementById('motorValor').value) || 0;

            const pj = bancoContratos.find(c => c.id === contratoId);
            
            if(tipo === 'Regular') {
                const index = bancoFolhaMensal.findIndex(f => f.contratoId === contratoId && f.tipo === 'Regular');
                if(index !== -1) {
                    if(evento === 'Desconto') bancoFolhaMensal[index].desconto += valor;
                    else bancoFolhaMensal[index].adicional += valor;
                    
                    bancoFolhaMensal[index].liquido = bancoFolhaMensal[index].base + bancoFolhaMensal[index].adicional - bancoFolhaMensal[index].desconto;
                }
            } else {
                bancoFolhaMensal.push({
                    id: bancoFolhaMensal.length,
                    contratoId: contratoId,
                    tipo: "Complementar",
                    descricao: `Folha complementar - ${evento}`,
                    base: 0,
                    adicional: valor,
                    desconto: 0,
                    liquido: valor,
                    status: "Aguardando Envio",
                    xmlNome: "",
                    dataAprovacao: ""
                });
            }

            set(ref(db, 'folhaMensal'), bancoFolhaMensal);
            gravarLog(`Ajuste executado no motor para ${pj.razaoSocial}: Evento ${evento} de R$ ${valor.toFixed(2)}`);
            alert("Motor recalculado e sincronizado na nuvem com sucesso!");
        }

        window.atualizarInterfacePortalPj = function() {
            const seletor = document.getElementById('seletorLoginPj');
            if(!seletor) return;
            const id = parseInt(seletor.value);
            const pj = bancoContratos.find(c => c.id === id);
            const folha = bancoFolhaMensal.find(f => f.contratoId === id);

            if(!pj || !folha) return;

            document.getElementById('pjNomeFicha').innerText = pj.razaoSocial;
            document.getElementById('pjCnpjFicha').innerText = `CNPJ: ${pj.cnpj}`;
            document.getElementById('pjBadgeTipo').innerText = `Folha ${folha.tipo}`;
            document.getElementById('pjValorBaseTxt').innerText = `R$ ${folha.base.toFixed(2)}`;
            document.getElementById('pjVariavelTxt').innerText = `+ R$ ${folha.adicional.toFixed(2)}`;
            document.getElementById('pjDescontoTxt').innerText = `- R$ ${folha.desconto.toFixed(2)}`;
            document.getElementById('pjLiquidoTxt').innerText = `R$ ${folha.liquido.toFixed(2)}`;

            const boxResp = document.getElementById('respostaValidacaoPj');
            if(boxResp) boxResp.className = "hidden p-4 rounded-lg text-sm border";
        }

        window.executarValidadorPj = function() {
            const id = parseInt(document.getElementById('seletorLoginPj').value);
            const filePdf = document.getElementById('inputPjPdf').files[0];
            const fileXml = document.getElementById('inputPjXml').files[0];
            const boxResp = document.getElementById('respostaValidacaoPj');

            if(!filePdf || !fileXml) {
                alert("Por favor, selecione ambos os arquivos (PDF e XML) para validação fiscal.");
                return;
            }

            if(boxResp) {
                boxResp.classList.remove('hidden');
                boxResp.className = "p-4 rounded-lg text-sm border bg-blue-50 text-blue-800 border-blue-200 animate-pulse";
                boxResp.innerText = "Analisando tags do XML e confrontando integridade matemática do PDF...";
            }

            setTimeout(() => {
                const index = bancoFolhaMensal.findIndex(f => f.contratoId === id);
                if(index !== -1) {
                    bancoFolhaMensal[index].status = 'Enviado';
                    bancoFolhaMensal[index].xmlNome = fileXml.name;
                    set(ref(db, 'folhaMensal'), bancoFolhaMensal);
                }
                if(boxResp) {
                    boxResp.className = "p-4 rounded-lg text-sm border bg-emerald-50 text-emerald-800 border-emerald-200";
                    boxResp.innerHTML = "<strong>✓ Sucesso!</strong> Assinatura da prefeitura verificada e compatível com o líquido calculado. Enviado ao RH para liberação financeira.";
                }
                gravarLog(`Prestador ID ${id} realizou upload com sucesso dos arquivos fiscais.`);
            }, 1500);
        }

        window.aprovarPagamentoAdmin = function(index) {
            bancoFolhaMensal[index].status = 'Aprovado';
            bancoFolhaMensal[index].dataAprovacao = new Date().toLocaleString('pt-BR');
            set(ref(db, 'folhaMensal'), bancoFolhaMensal);
            gravarLog(`Administrador aprovou formalmente a liquidação da folha ID ${index}.`);
        }

        function gravarLog(texto) {
            const caixa = document.getElementById('caixaLogsAuditoria');
            if(!caixa) return;
            const agora = new Date().toLocaleString('pt-BR');
            caixa.innerHTML += `<p class="text-emerald-400">[${agora}] - ${texto}</p>`;
            caixa.scrollTop = caixa.scrollHeight;
        }
    </script>
</body>
</html>
