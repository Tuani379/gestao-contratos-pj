<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Folha Mensal PJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 antialiased p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex gap-4">
            <button id="perfilAdmin" onclick="mudarPerfil('admin')" class="px-3 py-1.5 rounded text-sm font-medium bg-blue-600 text-white transition">Painel Administrativo RH</button>
            <button id="perfilPj" onclick="mudarPerfil('pj')" class="px-3 py-1.5 rounded text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-700 transition">Portal do Prestador PJ</button>
        </div>

        <div id="menuCorporativo" class="flex flex-col md:flex-row gap-6">
            <div class="w-full md:w-1/3 bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                <h2 class="text-lg font-bold text-slate-900 border-b pb-2">Motor de Lançamentos</h2>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">1. Selecionar Contrato (ID)</label>
                    <input type="number" id="motorContrato" class="w-full p-2 rounded border border-slate-300" value="0">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">2. Tipo de Folha</label>
                    <select id="motorTipoFolha" class="w-full p-2 rounded border border-slate-300">
                        <option value="Regular">Regular</option>
                        <option value="Complementar">Complementar</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">3. Tipo de Evento</label>
                    <select id="motorEvento" class="w-full p-2 rounded border border-slate-300">
                        <option value="Adicional">Adicional / Bônus</option>
                        <option value="Desconto">Descontos / Glosas</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">4. Valor do Evento (R$)</label>
                    <input type="number" id="motorValor" class="w-full p-2 rounded border border-slate-300" placeholder="0.00" step="0.01">
                </div>
                <button onclick="processarLancamentoMotor()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded transition">Aplicar e Atualizar</button>
            </div>

            <div class="w-full md:w-2/3 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col justify-between">
                <div class="p-6">
                    <h2 class="text-lg font-bold text-slate-900 border-b pb-2 mb-4">Demonstrativo Consolidado</h2>
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 text-slate-400 text-xs font-bold uppercase">
                                <th class="p-3">Razão Social</th>
                                <th class="p-3">Centro de Custo</th>
                                <th class="p-3">Tipo</th>
                                <th class="p-3 text-right">Líquido</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabelaRelatorio"></tbody>
                    </table>
                </div>
                <div class="bg-slate-50 p-4 border-t border-slate-200 flex justify-between items-center">
                    <span class="text-sm font-bold text-slate-500">TOTAL CONSOLIDADO:</span>
                    <span id="totalRelatorioSoma" class="text-xl font-black text-slate-900">R$ 0,00</span>
                </div>
            </div>
        </div>

        <div id="painelPjContainer" class="hidden bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-6">
            <h2 class="text-lg font-bold text-slate-900 border-b pb-3">Portal do Prestador</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-50 p-4 rounded-lg border">
                <div><p id="pjNomeFicha" class="font-bold">Razão Social</p></div>
                <div class="text-right"><span id="pjLiquidoTxt" class="text-xl font-black text-emerald-600">R$ 0,00</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHbovXitP9YkRTM902gy79Rwy9st3Igq8",
            authDomain: "connectpj-15532.firebaseapp.com",
            databaseURL: "https://connectpj-15532-default-rtdb.firebaseio.com",
            projectId: "connectpj-15532",
            storageBucket: "connectpj-15532.firebasestorage.app",
            messagingSenderId: "658474420007",
            appId: "1:658474420007:web:94f3331b69b2a298af4b02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let bancoContratos = [
            { id: 0, razaoSocial: "Tech Solutions PJ", centroCusto: "TI-Dev" },
            { id: 1, razaoSocial: "Consultoria Alpha Ltda", centroCusto: "RH" }
        ];
        let bancoFolhaMensal = [];

        onValue(ref(db, 'folhaMensal'), (snapshot) => {
            if(snapshot.exists()) {
                bancoFolhaMensal = snapshot.val();
                renderizarRelatorio();
            }
        });

        window.renderizarRelatorio = function() {
            const corpo = document.getElementById('corpoTabelaRelatorio');
            if(!corpo) return;
            corpo.innerHTML = "";
            let totalConsolidado = 0;

            bancoFolhaMensal.forEach(item => {
                const pj = bancoContratos.find(c => c.id === item.contratoId) || {razaoSocial: "N/A", centroCusto: "N/A"};
                totalConsolidado += item.liquido;
                corpo.innerHTML += `<tr><td class="p-3">${pj.razaoSocial}</td><td class="p-3">${pj.centroCusto}</td><td class="p-3">${item.tipo}</td><td class="p-3 text-right font-bold">R$ ${item.liquido.toFixed(2)}</td></tr>`;
            });
            document.getElementById('totalRelatorioSoma').innerText = `R$ ${totalConsolidado.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        window.mudarPerfil = function(perfil) {
            document.getElementById('menuCorporativo').classList.toggle('hidden', perfil !== 'admin');
            document.getElementById('painelPjContainer').classList.toggle('hidden', perfil !== 'pj');
        }

        window.processarLancamentoMotor = function() {
            alert("Sincronizando com Firebase...");
            // Lógica de set(ref(db, 'folhaMensal'), ...) aqui
        }
    </script>
</body>
</html>
