<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectPJ - Central de Folha</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">ConnectPJ</h1>
                <p class="text-xs opacity-75">Central de Contratos, Automação de NFs & Folha</p>
            </div>
            <div class="bg-blue-800 p-1 rounded-lg flex gap-1">
                <button class="bg-blue-600 px-4 py-2 rounded text-sm font-bold">Painel Corporativo (RH/Fin)</button>
                <button class="px-4 py-2 text-sm opacity-75 hover:bg-blue-700 rounded transition">Área do Prestador (PJ)</button>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b shadow-sm">
        <div class="max-w-7xl mx-auto flex gap-8 px-6">
            <button class="py-4 border-b-2 border-blue-600 text-sm font-bold text-blue-900">Dashboard & Folha Mensal</button>
            <button class="py-4 border-b-2 border-transparent text-sm font-bold text-slate-500 hover:text-slate-900">Contratos Cadastrados</button>
            <button class="py-4 border-b-2 border-transparent text-sm font-bold text-slate-500 hover:text-slate-900">Relatórios & Centro de Custos</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        <section class="grid grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-xl border shadow-sm">
                <p class="text-[10px] uppercase font-bold text-slate-400">Folha de Competência</p>
                <p class="text-xl font-black">Junho/2026</p>
            </div>
            <div class="bg-white p-4 rounded-xl border shadow-sm">
                <p class="text-[10px] uppercase font-bold text-slate-400">Total Bruto Processado</p>
                <p class="text-xl font-black text-emerald-600">R$ 0,00</p>
            </div>
            <div class="bg-white p-4 rounded-xl border shadow-sm">
                <p class="text-[10px] uppercase font-bold text-slate-400">Notas Fiscais Validadas</p>
                <p class="text-xl font-black">0 / 0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border shadow-sm">
                <p class="text-[10px] uppercase font-bold text-slate-400">Contratos Ativos</p>
                <p class="text-xl font-black">0 Empresas</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl border shadow-sm">
            <h2 class="font-bold text-blue-900 mb-4">⚙️ Motor Financeiro: Ajustes e Lançamentos Especiais</h2>
            <div class="grid grid-cols-4 gap-4">
                <select class="p-2 border rounded text-sm"><option>Alpha Marketing S.A.</option></select>
                <select class="p-2 border rounded text-sm"><option>Folha Complementar</option></select>
                <select class="p-2 border rounded text-sm"><option>Bônus por Performance</option></select>
                <input type="number" class="p-2 border rounded text-sm" placeholder="Valor (R$)">
            </div>
            <button class="mt-4 w-full bg-blue-600 text-white font-bold py-2 rounded shadow hover:bg-blue-700">Aplicar e Atualizar</button>
        </section>
    </main>

    <script type="module">
        // Sua lógica de conexão com Firebase vai aqui
        console.log("Sistema ConnectPJ carregado com sucesso!");
    </script>
</body>
</html>
